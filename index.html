<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login Chill App</title>
    <link rel="stylesheet" href="css/login&Register.css" />
  </head>
  <body>
    <div class="background-img">
      <div class="form-register">
        <div class="navbar-form">
          <img
            src="images/logo-chill.png"
            alt="chill-logo"
            class="chill-logo"
          />
          <h1>Masuk</h1>
          <p>Selamat Datang Kembali!</p>
        </div>
        <form class="form-input">
          <label for="Username"> Username </label>
          <input
            type="text"
            name="usernmae"
            placeholder="Masukkan Username"
            required
          />
          <div class="password-container">
            <label for="password">Kata Sandi</label>
            <div class="input-wrapper">
              <input
                type="password"
                id="password"
                name="password"
                placeholder="Masukkan Kata Sandi"
                required
              />
              <span id="togglePassword" class="eye-icon"
                ><img src="/images/eye-password.png"
              /></span>
            </div>
          </div>
          <div class="login-question">
            <p class="highlight">
              Belum punya akun?
              <span class="login-link"><a href="#">Daftar</a></span>
            </p>
            <p class="register-link">Lupa kata sandi?</p>
          </div>
          <div class="login-choice">
            <button type="submit" class="register-button">Masuk</button>
            <p class="highlight highlight-center">Atau</p>
            <button type="submit" class="google-regist">
              <span
                ><img class="google-icons" src="/images/google-icons.png"
              /></span>
              Masuk dengan Google
            </button>
          </div>
        </form>
      </div>
    </div>
  </body>
</html>
