<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home Page Chill App</title>
    <link rel="stylesheet" href="./css/styles.css">
</head>
<body id="home-body">
    <header class="home-header">
        <nav>
        <div class="chill-home">
            <img src="./images/logo-chill.png" alt="chill-icon">
            <a href="">Series</a>
            <a href="">Film</a>
        </div>
        <div class="user-icon">
            <img src="./images/user-icon.png" alt="user-icon">
            <img src="./images/down-arrow.png" alt="arrow-icon" class="arrow-icons">
        </div>
        </nav>
    </header>
    <main>
    <section class="chill-section1">
        <div class="chill-section1-box">
            <article>
                <h1>Duty After School</h1>
                <p>Sebuah benda tak dikenal mengambil alih dunia. Dalam keputusasaan, Departemen Pertahanan mulai merekrut lebih banyak tentara, termasuk siswa sekolah menengah. Mereka pun segera menjadi pejuang garis depan dalam perang.</p>
            </article>
            <article class="container-btn-home">
                <button class="start-btn-home">Mulai</button>
                <button class="detail-btn-home"><img src="./images/information-outline.png" alt="information"> Selengkapnya</button>
                <span class="btn-home-18">18+</span>
            </article>
        </div>
    </section>
    <section class="chill-section2">
        <h3>Melanjutkan Tonton Film</h3>
    </section>
    <section class="chill-section2-movie">
        <img src="./images/section2-img-1.png" alt="img-1">
        <img src="./images/section2-img-2.png" alt="img-2">
        <img src="./images/section2-img-3.png" alt="img-3">
        <img src="./images/section2-img-4.png" alt="img-4">
    </section>
    </main>
</body>
</html>
