<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrasi Chill App</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="background-img">
        <div class="form-register">
           <div class="navbar-form">
            <img src="images/logo-chill.png" alt="chill-logo" class="chill-logo">
            <h1>Daftar</h1>
            <p>Selamat Datang!</p>
           </div>
            <form class="form-input">
                <label for="Username">
                    Username
                </label>
                <input type="text" name="usernmae" placeholder="Masukkan Username" required>
                <label for="password">Kata Sandi</label>
                <input type="password" name="password" placeholder="Masukkan Kata Sandi" required>
                <label for="confirm-password">Konfirmasi Kata Sandi</label>
                <input type="password" name="confirm-password" placeholder="Masukkan Kata Sandi" required>
                <p class="highlight">Sudah punya akun? <span><a href="#">Masuk</a></span></p>
                <button type="submit" class="register-button">Daftar</button>
                <p class="highlight highlight-center">Atau</p>
                <button type="submit">Daftar dengan Google</button>
            </form>
        </div>
    </div>
</body>
</html>
